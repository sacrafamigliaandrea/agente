function show(id){const sp=document.getElementById("splashScreen");if(sp)sp.style.display="none";["menuScreen","gameScreen","resultScreen"].forEach(s=>{const e=document.getElementById(s);e.style.display=s===id+"Screen"?(id==="game"?"flex":"block"):"none"});document.body.style.overflow=id==="game"?"hidden":"auto"}
function goHome(){const sp=document.getElementById("splashScreen");sp.style.display="flex";sp.style.opacity="0";sp.classList.remove("out");["menuScreen","gameScreen","resultScreen"].forEach(s=>document.getElementById(s).style.display="none");requestAnimationFrame(()=>{sp.style.opacity="1"});document.body.style.overflow="hidden"}
function showMenu(){show("menu");rMenu()}
function rMenu(){document.getElementById("menuScreen").innerHTML=`<div class="mw"><div style="margin-bottom:12px"><button class="home-btn" onclick="goHome()"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8l6-6 6 6M4 7v6a1 1 0 001 1h2v-3h2v3h2a1 1 0 001-1V7" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg> Home</button></div><div class="mhero"><div class="hbadge">${I.shield}<div><h1>Commissariato Digitale</h1><div class="sub">Simulazione Polizia Postale</div></div></div><p class="mdesc">Sei un agente della Polizia Postale. Ascolta i cittadini, indaga, consulta il database normativo e istruisci correttamente la pratica.</p></div><div class="cgrid">${CS.map(c=>{const d=dn[c.id],cl=d!==undefined?"cbtn dn":"cbtn";const b=d!==undefined?`<span class="bdg" style="background:${d>=80?'var(--pet)':d>=50?'var(--amb)':'var(--ros)'}">${d}%</span>`:"";return`<button class="${cl}" onclick="go(${c.id})"><div style="flex-shrink:0">${av(c.av,52)}</div><div style="flex:1"><div class="cn">Caso #${c.id}</div><div class="ct">${c.title}</div><div class="cs">${c.sub}</div>${b}</div></button>`}).join("")}</div></div>${FOOTER}`}
function go(id){cc=CS.find(c=>c.id===id);ak=[];fs={tipo:[],norm:[],azioni:[]};xc=null;ft="all";show("game");rGame()}
function rGame(){if(!cc)return;document.getElementById("gameScreen").innerHTML=`
    <div class="gh">
      <div class="gl">
        <button class="bbk" onclick="goHome()" title="Home"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8l6-6 6 6M4 7v6a1 1 0 001 1h2v-3h2v3h2a1 1 0 001-1V7" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="bbk" onclick="showMenu()">&#8592; Casi</button>
        <span class="ls">${I.shSm} Commissariato Digitale</span>
      </div>
      <div class="cpill">Caso #${cc.id} — ${cc.title}</div>
      <button class="cbx off" id="cBtn" onclick="doClose()">${I.fasc} Chiudi pratica</button>
    </div>
    <div class="cols">
      <div class="cL">
        <div class="cLh" id="cH"></div>
        <div class="cLb" id="cB"></div>
      </div>
      <div class="cC">
        <div class="agent-strip">
          <img src="post.jpg" alt="Agente">
          <div class="ag-info"><div class="ag-role">Agente di Polizia Postale</div><div class="ag-name">Istruzione della pratica</div></div>
        </div>
        <div class="cCh">
          <div>${I.fasc}</div>
          <div><div class="lb">Fascicolo</div><div class="tt">Compila il fascicolo del caso</div></div>
        </div>
        <div class="cCb" id="fB"></div>
      </div>
      <div class="cR">
        <div class="cRh"><div class="lb">${I.arch} Archivio</div><div class="tt">Database normativo</div><div class="sw">${I.srch}<input type="text" class="si" id="sI" placeholder="Cerca articolo, legge, procedura..." oninput="rA()"></div><div class="fls" id="fF"></div></div>
        <div class="cRb" id="aB"></div>
      </div>
    </div>`;rC();rF();rFl();rA()}
function rC(){document.getElementById("cH").innerHTML=`<div style="flex-shrink:0">${av(cc.av,48)}</div><div><div class="lb" style="color:var(--ros)">Cittadino allo sportello</div><div class="nm">${cc.who}</div></div>`;let h=`<div class="bc"><p>"${cc.intro}"</p></div>`;cc.qs.filter(q=>ak.includes(q.id)).forEach(q=>{h+=`<div style="animation:slideIn .25s"><div class="ba">${q.l}</div><div class="bc"><p>"${q.a}"</p></div></div>`});const rm=cc.qs.filter(q=>!ak.includes(q.id));if(rm.length){h+=`<div style="margin-top:8px"><div class="ql">Chiedi al cittadino</div>`;rm.forEach(q=>{h+=`<button class="qb" onclick="aq('${q.id}')">${I.ask} ${q.l}</button>`});h+=`</div>`}const b=document.getElementById("cB");b.innerHTML=h;b.scrollTop=b.scrollHeight}
function aq(q){if(!ak.includes(q))ak.push(q);rC()}
function rF(){let h="";SL.forEach(s=>{const it=fs[s.id],fl=it.length>0;h+=`<div class="sl ${fl?'f':'e'}" ondragover="event.preventDefault();this.classList.add('dv')" ondragleave="this.classList.remove('dv')" ondrop="dd(event,'${s.id}');this.classList.remove('dv')"><div class="sh" style="margin-bottom:${fl?6:0}px"><span class="sn ${fl?'y':'n'}">${s.icon}</span><span class="sll ${fl?'y':'n'}">${s.label}</span></div>`;if(!fl)h+=`<div class="sht">${I.drag} Trascina qui dall'archivio</div>`;it.forEach(i=>{h+=`<div class="dp"><span class="dot" style="background:${i.color}"></span><span class="cd" style="color:${i.color}">${i.code}</span><span class="dt">${i.title}</span><button class="rm" onclick="ri('${s.id}','${i.id}')">&times;</button></div>`});h+=`</div>`});const t=fs.tipo.length+fs.norm.length+fs.azioni.length;if(t)h+=`<div class="fc">${t} element${t===1?'o':'i'}</div>`;document.getElementById("fB").innerHTML=h;const b=document.getElementById("cBtn");b.className=t?"cbx on":"cbx off"}
function dd(e,sid){e.preventDefault();const iid=e.dataTransfer.getData("text/plain"),it=ALL.find(a=>a.id===iid);if(!it)return;const sl=SL.find(s=>s.id===sid);if(!sl||!sl.accepts.includes(it.cat)||fs[sid].find(i=>i.id===iid))return;fs[sid].push(it);rF()}
function ri(s,id){fs[s]=fs[s].filter(i=>i.id!==id);rF()}
function rFl(){const ff=[{k:"all",l:"Tutti"},{k:"tipo",l:"Tipo"},{k:"norm",l:"Normativa"},{k:"proc",l:"Procedure"}];document.getElementById("fF").innerHTML=ff.map(f=>`<button class="fb ${ft===f.k?'on':''}" onclick="sf('${f.k}')">${f.l}</button>`).join("")}
function sf(f){ft=f;rFl();rA()}
function rA(){const t=((document.getElementById("sI")||{}).value||"").toLowerCase();const fl=ALL.filter(i=>{const ms=!t||i.title.toLowerCase().includes(t)||i.code.toLowerCase().includes(t)||i.desc.toLowerCase().includes(t);const mf=ft==="all"||i.cat===ft||(ft==="norm"&&(i.cat==="reato"||i.cat==="legge"));return ms&&mf});const g={};fl.forEach(i=>{if(!g[i.cat])g[i.cat]=[];g[i.cat].push(i)});let h="";cO.filter(c=>g[c]).forEach(c=>{h+=`<div style="margin-bottom:12px"><div class="ch">${cI[c]||""} ${cL[c]}</div>`;g[c].forEach(i=>{const ex=xc===i.id;h+=`<div class="ac ${ex?'ex':''}" draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${i.id}')" onclick="tc('${i.id}')" style="border-left:4px solid ${i.color}"><div class="tp"><div style="min-width:0"><span class="dot" style="background:${i.color}"></span><span class="mono" style="font-weight:700;font-size:11px;color:${i.color}">${i.code}</span> <span style="font-size:11.5px">${i.title}</span></div><span class="aw">&#9660;</span></div>${ex?`<div class="dl">${i.desc}</div>`:''}</div>`});h+=`</div>`});if(!fl.length)h=`<div style="text-align:center;padding:20px;color:#bbb;font-size:11px">Nessun risultato</div>`;document.getElementById("aB").innerHTML=h}
function tc(id){xc=xc===id?null:id;rA()}
function doClose(){const t=fs.tipo.length+fs.norm.length+fs.azioni.length;if(!t||!cc)return;let cor=0,tot=0,det={};["tipo","norm","azioni"].forEach(s=>{const ex=cc.sol[s]||[],pl=fs[s].map(i=>i.id);const h=ex.filter(e=>pl.includes(e)),m=ex.filter(e=>!pl.includes(e)),x=pl.filter(p=>!ex.includes(p));cor+=h.length;tot+=ex.length;det[s]={h,m,x}});const xt=Object.values(det).reduce((a,d)=>a+d.x.length,0);const sc=Math.max(0,Math.round(((tot>0?cor/tot:0)-xt*0.1)*100));dn[cc.id]=sc;rRes(sc,det)}
function rRes(sc,det){const col=sc>=80?"var(--pet)":sc>=50?"var(--amb)":"var(--ros)";const lb=sc>=80?"Pratica eccellente":sc>=50?"Pratica parzialmente corretta":"Pratica da rivedere";let h=`<div class="rh"><div class="rn" style="color:${col}">${sc}%</div><div class="rl">${lb}</div></div><div class="rb"><div class="rt">${I.fasc} Analisi del caso</div><p>${cc.fb}</p></div>`;["tipo","norm","azioni"].forEach(s=>{const d=det[s],sl=SL.find(x=>x.id===s);h+=`<div class="rb"><div class="rt">${sl.label}</div>`;d.h.forEach(x=>{const i=ALL.find(a=>a.id===x);h+=`<div class="rhi">${I.ok} ${i.code} — ${i.title}</div>`});d.m.forEach(x=>{const i=ALL.find(a=>a.id===x);h+=`<div class="rmi">${I.ko} Mancante: ${i.code} — ${i.title}</div>`});d.x.forEach(x=>{const i=ALL.find(a=>a.id===x);h+=`<div class="rei">${I.wrn} Non pertinente: ${i.code} — ${i.title}</div>`});if(d.h.length===(cc.sol[s]||[]).length&&!d.x.length)h+=`<div class="rok">Perfetto!</div>`;h+=`</div>`});h+=`<div class="rbt"><button class="bry" onclick="go(${cc.id})">Riprova</button><button class="bmn" onclick="showMenu()">Torna ai casi</button><button class="bry" onclick="goHome()" style="flex:0.6"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8l6-6 6 6M4 7v6a1 1 0 001 1h2v-3h2v3h2a1 1 0 001-1V7" stroke="#2C3E6B" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg> Home</button></div>`;document.getElementById("resultScreen").innerHTML=`<div class="rw">${h}</div>${FOOTER}`;show("result")}
function enterApp(){const sp=document.getElementById("splashScreen");sp.classList.add("out");setTimeout(()=>{sp.style.display="none";showMenu()},600)}
// INIT: show splash, hide others
document.getElementById("menuScreen").style.display="none";
document.getElementById("gameScreen").style.display="none";
document.getElementById("resultScreen").style.display="none";
document.body.style.overflow="hidden";
</script>
</body>
</html>
